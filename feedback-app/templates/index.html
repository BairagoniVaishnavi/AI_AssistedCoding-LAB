<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Feedback</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
    }
    .box {
      width: 400px;
      margin: 60px auto;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    button {
      background: #2563eb;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }
    .msg {
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
    }
    .success {
      background: #dcfce7;
      color: #166534;
    }
    .error {
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Feedback Form</h2>

    {% if message %}
      <div class="msg success">{{ message }}</div>
    {% endif %}

    {% if error %}
      <div class="msg error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/submit">
      <input type="text" name="name" placeholder="Enter Name" required maxlength="100">
      <input type="email" name="email" placeholder="Enter Email" required maxlength="100">
      <textarea name="feedback" placeholder="Enter Feedback" required maxlength="500"></textarea>
      <button type="submit">Submit</button>
    </form>
  </div>
</body>
</html>
